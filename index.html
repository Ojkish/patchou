<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
  <title>DMX Patcher & Résultats</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <nav>
    <button id="show-patch">Patch DMX</button>
    <button id="show-results">Voir Résultats</button>
    <button id="show-projects">Projets</button>  
  </nav>

  <section id="patch-section">
    <div class="main-container">
      <h1>PATCHAPAPA</h1>
      <form id="patchForm" onsubmit="return false;">
        
        <div class="form-group" style="position: relative;">
          <label for="projectorName">Nom du projecteur :</label>
          <input type="text" id="projectorName" placeholder="Ex: Aura" autocomplete="off" class="selectable-text">
          <ul id="projector-suggestions" class="suggestions hidden"></ul>
        </div>

        <div class="form-group hidden" id="mode-group">
          <label for="modeSelect">Mode :</label>
          <div class="mode-select-container">
            <select id="modeSelect"></select>
          </div>
        </div>

        <div class="form-group">
          <label for="projectorCount">Nombre de projecteurs :</label>
          <div class="number-input-container">
            <button class="number-control" data-action="decrement" data-target="projectorCount">-</button>
            <input type="number" id="projectorCount" value="1" min="1" max="512" inputmode="numeric" pattern="[0-9]*">
            <button class="number-control" data-action="increment" data-target="projectorCount">+</button>
          </div>
        </div>

        <div class="form-group">
          <label for="channelCount">Nombre de canaux par projecteur :</label>
          <div class="number-input-container">
            <button class="number-control" data-action="decrement" data-target="channelCount">-</button>
            <input type="number" id="channelCount" value="1" min="1" max="512" inputmode="numeric" pattern="[0-9]*">
            <button class="number-control" data-action="increment" data-target="channelCount">+</button>
          </div>
        </div>

        <div class="form-group">
          <label for="universe">Univers de départ :</label>
          <div class="number-input-container">
            <button class="number-control" data-action="decrement" data-target="universe">-</button>
            <input type="number" id="universe" value="1" min="1" inputmode="numeric" pattern="[0-9]*">
            <button class="number-control" data-action="increment" data-target="universe">+</button>
          </div>
        </div>

        <div class="form-group">
          <label for="address">Adresse de départ :</label>
          <div class="number-input-container">
            <button class="number-control" data-action="decrement" data-target="address">-</button>
            <input type="number" id="address" value="1" min="1" max="512" inputmode="numeric" pattern="[0-9]*">
            <button class="number-control" data-action="increment" data-target="address">+</button>
          </div>
        </div>

        <div class="action-buttons">
          <button type="button" id="patchButton" class="action-button primary">Patch</button>
          
          <button type="button" id="undoButton" class="action-button secondary" title="Annuler">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;">
              <polyline points="9 14 4 9 9 4"></polyline>
              <path d="M20 20v-7a4 4 0 0 0-4-4H4"></path>
            </svg>
            Annuler
          </button>          
          
          <button type="button" id="resetButton" class="action-button secondary">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;">
              <polyline points="3 6 5 6 21 6"></polyline>
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            </svg>
            Reset
          </button>          
          
          <button type="button" id="resultsButton" class="action-button secondary">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;">
              <line x1="8" y1="6" x2="21" y2="6"></line>
              <line x1="8" y1="12" x2="21" y2="12"></line>
              <line x1="8" y1="18" x2="21" y2="18"></line>
              <line x1="3" y1="6" x2="3.01" y2="6"></line>
              <line x1="3" y1="12" x2="3.01" y2="12"></line>
              <line x1="3" y1="18" x2="3.01" y2="18"></line>
            </svg>
            Résultats
          </button>
        </div>
      </form>
      <div id="output" class="selectable-text"></div>
    </div>
  </section>

  <section id="results-section" class="hidden">
    <div class="main-container results-container">
      <div class="results-header">
        <h1>Résultats du Patch</h1>
        <div class="filter-container">
          <input type="text" id="name-filter" placeholder="Filtrer par nom" class="selectable-text">
          <select id="universe-filter">
            <option value="all">Tous les univers</option>
          </select>
        </div>
      </div>

      

  
      <div class="results-scroll">
        <table id="results-table" class="selectable-text">
          <thead>
            <tr>
              <th>Nom <span class="sort-icon">⇅</span></th>
              <th>U <span class="sort-icon">⇅</span></th>
              <th style="color: #3b82f6;">Adresse <span class="sort-icon">⇅</span></th>
              <th>Fin <span class="sort-icon">⇅</span></th>
              <th>Ch <span class="sort-icon">⇅</span></th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
  
      <div class="export-buttons results-footer">
        <div class="buttons-container">
          <button id="export-csv" class="action-button primary">📄 Export CSV</button>
          <button id="send-email" class="action-button primary">✉️ E-mail</button>
        </div>
      </div>
    </div>
  </section>

<section id="projects-section" class="hidden">
  <div class="main-container">
    <h1>Projets</h1>
    <div class="action-buttons">
      <button type="button" id="saveProjectButton" class="action-button primary">
        💾 Sauvegarder le patch actuel
      </button>
    </div>
    <div id="projects-list" style="margin-top: 30px;">
      <!-- La liste des projets apparaîtra ici -->
    </div>
  </div>
</section>


  <div id="custom-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <h3 id="modal-title">Confirmation</h3>
      <p id="modal-message">Voulez-vous vraiment faire cela ?</p>
      <div class="modal-buttons">
        <button id="modal-cancel" class="action-button secondary">Annuler</button>
        <button id="modal-confirm" class="action-button primary">Confirmer</button>
      </div>
    </div>
  </div>

  <script type="module" src="./js/data/projectors.js"></script>
  <script type="module" src="./js/utils.js"></script>
  <script src="./js/lib/fuse.js"></script>
  <script type="module" src="./js/patcher.js"></script>
  <script type="module" src="./js/emailFormatter.js"></script>
  <script type="module" src="./js/results.js"></script>
  <script type="module" src="./js/projects.js"></script>
</body>
</html>
